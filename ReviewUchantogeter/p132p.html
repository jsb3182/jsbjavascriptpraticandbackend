<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script>
        //변수를 선언합니다.
        const date = new Date() //현재 날자와 신가을 갖는 객체를 생성합니다.
        const hour= date.getHours() //현제시간을0~23 사이의 값으로 출력하는 메소드
        //if 조건문
        if (hour < 12){
            //표현식 hour < 12가 참일 때 실행합니다.
            alert('오전입니다.');
        }
        if (hour >= 12){
            //표현식 hour >= 12가 참일 떄 실행 합니다.
            alert('오후입니다.')
        }
    </script>
</head>
<body>
    
</body>
</html>
