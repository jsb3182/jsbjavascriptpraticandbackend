<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script>
        //변수를 선언합니다.
        const date = new Date()
        const hour = date.getHours()
        // 중첩 조건문
        if (hour < 11){
            //표현식 hour< 11 이참일떄 실행합니다.
            alert('아침 먹을 시간입니다.')
        }else {
            // 표현식 hour < 11익 거직일때 실행합니다.
            if(hour < 15){
                //표현식 hpur < 15 가 참일때 실행합니다
                alert('점심 먹을 시간입니다.')
            }else {
                // 표현식 hour < 15 가 거짓일때 실행합니다.
                alert('저녁 먹을 시간입니다.')
            }
        }
    </script>
</head>

</body>
</html>
