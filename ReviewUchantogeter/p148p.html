<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script>
        //입력이 문자열이므로 다음과 같은 코드를 사용할수 있습니다.
        const 입력 = prompt('숫자를 입력하세요')
        const 끝자리 = 입력[입력.length - 1]
        //출력합니다.
        if (끝자리 === "0" || 
            끝자리 === "2" ||
            끝자리 === "4" ||
            끝자리 === "6" ||
            끝자리 === "8"){
                alert(`${입력}은 짝수입니다.`)
            }else {
                alert(`${입력}은 홀수입니다.`)
            }
        
    </script>
</head>

</body>
</html>
