<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script>
        //숫자를 입력받습니다.
        const rawInput = prompt('숫자를입력받습니다')
        //입력을 숫자로 변경하고 inch 단위로 변경합니다.
        const cm = Number(rawInput)
        const inch = cm / 2.54
        //출력합니다
        alert(`${cm}cm는${inch}inch입니다,`)
    </script>
</head>
<body>
    
</body>
</html>
