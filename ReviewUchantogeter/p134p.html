<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script>
        //변수를 선언합니다
        const date = new Date()
        const hour = date.getHours()
        //if 조건문
        if (hour < 12) {
            //포현식 hour < 12 가 참일때 실행합니다.
            alert('오전입니다.')
        }else{
            //표현hour에서 < 12 가 거짓일떄 실행합니다.
            alert('오후입니다.')
        }
    </script>
</head>
<body>
    
</body>
</html>
