<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script>
        //숫자를 입력받습니다.
        let rawInput = prompt('원에 반지름을 입력해주세요')
        const r = Number(rawInput)
        const area = 3.14 * r * r
        const circum = 2 * 3.14 * r
        document.write(`입력받은 반지름은${rawInput}입니다`)
        //출력합니다
        alert(`원의 넓이는${area}입니다.`)
        alert(`원의 둘레는${circum}입니다.`)
        

    </script>
</head>
<body>
    
</body>
</html>
