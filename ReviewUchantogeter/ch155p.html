<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script>
        const rawInput = prompt('태어난 해를 입력주세요.', '')
        const year = Number(rawInput)
        //12로나눈 나머지에 따라 띠가 결정됩니다
        // 0원숭이 0: 원숭이, 1: 닭, 2: 개, 3: 돼지, 4: 쥐, 5: 소, 6: 호랑이, 7: 토끼, 8: 용, 9: 뱀, 10: 말, 11: 양
        const e = year % 12
        let result
        switch (e) {
            case 0: result = '원숭이'; break;
            case 1: result = '닭'; break;
            case 2: result = '개'; break;
            case 3: result = '돼지'; break;
            case 4: result = '쥐'; break;
            case 5: result = '소'; break;
            case 6: result = '호랑이'; break;
            case 7: result = '토끼'; break;
            case 8: result = '용'; break;
            case 9: result = '뱀'; break;
            case 10: result = '말'; break;
            case 11: result = '양'; break;
            default: result = '알수없음'; break; 
       }
       if (result !== '알수없음'){
        alert(`${result}년에 태어난다면 ${result}띠입니다.`)
       }else {
        alert('올바른 연도를 입력해주세요')
       }
        
    </script>
</head>

<body>

</body>

</html>
