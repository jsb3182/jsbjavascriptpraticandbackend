<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script>
        const a = Number(prompt('숫자를 입력해주세요', ''))
        if(a>0){
            document.write("입력받은수는 양수입니다")
        }else if(a<0){
            document.write("입력받은수는 음수입니다")
        }else{
            document.write("입력받은수는 0입니다")
        }
    </script>
</head>
<body>
    
</body>
</html>
