<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script>
        const month = Number(prompt('숫자를 입력해주세요', ''))
        if(month >= 2 && month <= 4){
            return "봄";
        }
        else if(month >= 5 && month <= 10){
            return "여름";
        
        }
        else if(month >= 11 && month <= 12){
            return "가을";

        }
        else {
            return "겨울";
        }
    </script>
</head>

</body>
</html>
