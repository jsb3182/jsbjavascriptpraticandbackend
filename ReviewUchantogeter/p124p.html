<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script>
        //숫자를 입력받습니다.
        const rawInput = prompt('숫자를 입력하세요')
        //입력하는 데이터를 숫자형으로 변경하고 단위를 변경합니다.
        const inch = Number(rawInput)
        const cm = inch * 2.54
        //출력합니다.
        alert(`${inch}inch는 ${cm}cm입니다.`)
    </script>
</head>
<body>
    
</body>
</html>
