<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script>
        const a = Number(prompt('첫번째 숫자',''))
        const b = Number(prompt('두번째 숫자',''))
        if(a > b){
            alert('첫번째 입력한 숫자가 더 큽니다')
        }else if (a == b){
            alert('두입력받은 수가 같습니다')
        }else{
            alert('두번째로 입력한 숫자가 더큽니다.')
        }
    </script>
</head>
<body>
    
</body>
</html>
