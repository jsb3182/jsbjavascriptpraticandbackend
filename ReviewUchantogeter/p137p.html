<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script>
        // 변수를 선언합니다.
        const date = new Date()
        const hour = date.getHours()
        // if else if 조건문
        if (hour< 11){
            //hour < 11 이 참일떄 실행합니다.
            alert('아침 먹을 시간입니다.')
        }else if (hour < 15) {
            //표현식 hour < 11이 거짓이고 표현식 hour < 15일때 실행합니다.
            alert('점심 먹을 시간입니다.')
        }else {
            alert('저녁먹을 시간입니다.')
        }
    </script>
</head>
<body>
    
</body>
</html>
